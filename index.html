<style>
  :root{
    --terracotta:#B5532A;
    --clay:#6E3522;
    --sand:#EDE3D5;
    --charcoal:#211B16;
    --stone:#8A938A;
    --line:#D7C9B4;
    --ink:#F1E8DA;     /* beige content on terracotta */
    --cream:#FCF6EC;   /* brightest, hover */
    --serif:"DM Serif Display", Georgia, serif;
    --body:"Fredoka", system-ui, sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; background:var(--terracotta); color:var(--ink);
    font-family:var(--body); overflow:hidden;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  /* faint kiln vignette across the fired-clay ground */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(125% 105% at 50% 42%, #C0602F 0%, #B5532A 50%, #9C4520 100%);
  }
  .stage{ position:fixed; inset:0; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }

  /* ============ HERO, the pot is the star ============ */
  .hero{ display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; }
  .pot{ color:var(--ink); display:block; transform-origin:50% 62%; }
  .pot path, .pot ellipse{ fill:none; stroke:currentColor; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; }
  .pot .thin{ stroke-width:1.9; }
  .word{ font-family:var(--serif); font-size:64px; line-height:1; color:var(--cream); letter-spacing:.012em; margin-top:30px; }
  .lead{
    margin:24px auto 0; max-width:560px; text-align:center; font-weight:300; font-size:16.5px; line-height:1.62;
    color:var(--ink); opacity:.9; text-wrap:pretty;
  }
  .lead span{ display:block; }
  .lead span + span{ margin-top:14px; }
  .lead em{ font-style:italic; font-family:var(--serif); font-weight:400; color:var(--cream); font-size:1.04em; }

  /* ============ CORNERS ============ */
  .credit{ position:absolute; top:30px; z-index:4; font-size:12px; letter-spacing:.04em; color:var(--ink); opacity:.72; }
  .credit a{ color:var(--cream); text-decoration:none; border-bottom:1px solid transparent; transition:border-color .35s ease; }
  .credit a:hover{ border-color:var(--cream); }
  .credit.left{ left:38px; }
  .credit.right{ right:38px; text-align:right; }
  .credit.right em{ font-family:var(--serif); font-style:italic; color:var(--cream); font-size:13px; }

  /* ============ MOTION, a whisper of life ============ */
  .pot{ animation:rise 1.2s .1s cubic-bezier(.2,.7,.2,1) both, breathe 9s 1.6s ease-in-out infinite; }
  .word{ animation:rise 1.1s .34s cubic-bezier(.2,.7,.2,1) both; }
  .lead{ animation:rise 1.1s .52s cubic-bezier(.2,.7,.2,1) both; }
  .credit.left{ animation:fade 1.2s 1.0s ease both; }
  .credit.right{ animation:fade 1.2s 1.14s ease both; }
  @keyframes rise{ from{ opacity:0; transform:translateY(13px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes fade{ from{ opacity:0; } to{ opacity:1; } }
  @keyframes breathe{ 0%,100%{ transform:translateY(0) scale(1); } 50%{ transform:translateY(-3px) scale(1.013); } }
  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; } }

  /* ============ MOBILE ============ */
  @media (max-width:720px){
    html, body{ height:auto; }
    body{ overflow-x:hidden; overflow-y:auto; }

    .stage{
      position:static; inset:auto; min-height:100vh; min-height:100dvh;
      justify-content:center; align-items:center;
      padding:64px 26px 56px;
    }

    /* reorder the absolute corners into the natural flow, at the foot */
    .credit{ position:static; top:auto; left:auto; right:auto; text-align:center; opacity:.74; }
    .credit.left{ order:5; margin-top:48px; }
    .credit.right{ order:6; margin-top:7px; }

    .hero{ order:1; flex:0 0 auto; padding:0; }
    .pot{ width:144px; height:auto; }
    .word{ font-size:46px; margin-top:20px; }
    .lead{ font-size:15.5px; line-height:1.6; margin-top:18px; max-width:34rem; }
    .lead span + span{ margin-top:13px; }
  }
</style>

<body>
  <div class="stage">

    <div class="credit left">Kept by <a href="https://amrith.co/?ref=gulgulo" target="_blank" rel="noopener">amrith</a></div>
    <div class="credit right">In honor of my <em>mamama</em></div>

    <header class="hero">
      <svg class="pot" width="208" height="216" viewBox="0 0 100 104" aria-label="Gulgulo">
        <path d="M 28,31 C 26,36 33,39 33,43 C 33,50 20,52 19,62 C 18,75 25,90 38,94 L 62,94 C 75,90 82,75 81,62 C 80,52 67,50 67,43 C 67,39 74,36 72,31"></path>
        <ellipse cx="50" cy="31" rx="22" ry="4.2"></ellipse>
        <path class="thin" d="M 33,44 Q 50,47 67,44"></path>
        <path class="thin" d="M 26,52 Q 50,56 74,52"></path>
        <path class="thin" d="M 20,61 Q 50,66.5 80,61"></path>
      </svg>
      <h1 class="word">Gulgulo</h1>
      <p class="lead"><span>The Konkani word for a handmade terracotta pot — a clay body, a clay lid — that keeps water cool and gives it a soft, mineral taste.</span><span>Kept here as a small thing, in honor of my <em>mamama</em>, whose gulgulo was always cool and always full.</span></p>
    </header>

  </div>
