<style>
  :root{
    --terracotta:#B5532A;
    --clay:#6E3522;
    --sand:#EDE3D5;
    --charcoal:#211B16;
    --stone:#8A938A;
    --line:#D7C9B4;
    --ink:#F1E8DA;     /* beige content on terracotta */
    --cream:#FCF6EC;   /* brightest, hover */
    --serif:"DM Serif Display", Georgia, serif;
    --body:"Fredoka", system-ui, sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; background:var(--terracotta); color:var(--ink);
    font-family:var(--body); overflow:hidden;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  /* faint kiln vignette across the fired-clay ground */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(125% 105% at 50% 42%, #C0602F 0%, #B5532A 50%, #9C4520 100%);
  }
  .stage{ position:fixed; inset:0; z-index:1; display:flex; flex-direction:column; }

  /* ============ HERO, the pot is the star ============ */
  .hero{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px 0; }
  .pot{ color:var(--ink); display:block; transform-origin:50% 62%; }
  .pot path, .pot ellipse{ fill:none; stroke:currentColor; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; }
  .pot .thin{ stroke-width:1.9; }
  .word{ font-family:var(--serif); font-size:64px; line-height:1; color:var(--cream); letter-spacing:.012em; margin-top:30px; }
  .lead{
    margin:20px auto 0; max-width:700px; text-align:center; font-weight:300; font-size:16.5px; line-height:1.5;
    color:var(--ink); opacity:.9; text-wrap:pretty;
  }
  .lead span{ display:block; }
  .lead span + span{ margin-top:8px; }
  .lead em{ font-style:italic; font-family:var(--serif); font-weight:400; color:var(--cream); font-size:1.04em; }

  /* ============ PRODUCTS, one quiet line at the foot ============ */
  .rail{
    display:flex; align-items:center; justify-content:center; flex-wrap:wrap;
    gap:34px; padding:0 40px 84px;
  }
  .cluster{ display:flex; align-items:baseline; gap:30px; }
  .cluster.india{ gap:16px; }
  .product{
    position:relative; text-decoration:none;
    font-family:var(--body); font-weight:400; font-size:16.5px; letter-spacing:.012em;
    color:var(--ink); opacity:.78;
    transition:color .45s ease, opacity .45s ease;
  }
  .product:hover, .product:focus-visible{ color:var(--cream); opacity:1; outline:none; }
  /* Dhuni rides quietly with Samooh, it's Samooh's channel, not a peer */
  .product.sub{ font-size:14.5px; opacity:.62; }
  .amp{ color:var(--ink); opacity:.5; font-size:13.5px; font-weight:300; }
  .sep{ width:1px; height:17px; background:var(--ink); opacity:.32; }

  /* hover whisper: the tagline, never present until asked for */
  .product::after{
    content:attr(data-tag); position:absolute; top:calc(100% + 9px); left:50%;
    transform:translateX(-50%) translateY(-3px); white-space:nowrap;
    font-size:11.5px; font-weight:400; letter-spacing:.02em; color:var(--ink);
    opacity:0; pointer-events:none; transition:opacity .45s ease, transform .45s ease;
  }
  .product:hover::after, .product:focus-visible::after{ opacity:.78; transform:translateX(-50%) translateY(0); }

  /* ============ CORNERS ============ */
  .credit{ position:absolute; top:30px; z-index:4; font-size:12px; letter-spacing:.04em; color:var(--ink); opacity:.72; }
  .credit a{ color:var(--cream); text-decoration:none; border-bottom:1px solid transparent; transition:border-color .35s ease; }
  .credit a:hover{ border-color:var(--cream); }
  .credit.left{ left:38px; }
  .credit.right{ right:38px; text-align:right; }
  .credit.right em{ font-family:var(--serif); font-style:italic; color:var(--cream); font-size:13px; }

  /* ============ MOTION, a whisper of life ============ */
  .pot{ animation:rise 1.2s .1s cubic-bezier(.2,.7,.2,1) both, breathe 9s 1.6s ease-in-out infinite; }
  .word{ animation:rise 1.1s .34s cubic-bezier(.2,.7,.2,1) both; }
  .lead{ animation:rise 1.1s .52s cubic-bezier(.2,.7,.2,1) both; }
  .product{ animation:rise 1s cubic-bezier(.2,.7,.2,1) both; }
  .cluster .product:nth-child(1){ animation-delay:.70s; }
  .cluster .product:nth-child(2){ animation-delay:.78s; }
  .cluster .product:nth-child(3){ animation-delay:.86s; }
  .cluster .product:nth-child(4){ animation-delay:.94s; }
  .cluster.india .product{ animation-delay:1.02s; }
  .sep{ animation:fade 1s .92s ease both; }
  .amp{ animation:fade 1s 1.04s ease both; }
  .credit.left{ animation:fade 1.2s 1.2s ease both; }
  .credit.right{ animation:fade 1.2s 1.34s ease both; }
  @keyframes rise{ from{ opacity:0; transform:translateY(13px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes fade{ from{ opacity:0; } to{ opacity:1; } }
  @keyframes breathe{ 0%,100%{ transform:translateY(0) scale(1); } 50%{ transform:translateY(-3px) scale(1.013); } }
  /* keep resting opacities after rise finishes */
  .product{ }
  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; } }

  /* ============ MOBILE ============ */
  @media (max-width:720px){
    html, body{ height:auto; }
    body{ overflow-x:hidden; overflow-y:auto; }

    .stage{
      position:static; inset:auto; min-height:100vh; min-height:100dvh;
      justify-content:flex-start; align-items:center;
      padding:58px 26px 46px;
    }

    /* reorder the absolute corners into the natural flow, at the foot */
    .credit{ position:static; top:auto; left:auto; right:auto; text-align:center; opacity:.74; }
    .credit.left{ order:5; margin-top:44px; }
    .credit.right{ order:6; margin-top:7px; }

    .hero{ order:1; flex:0 0 auto; padding:0; }
    .pot{ width:144px; height:auto; }
    .word{ font-size:46px; margin-top:20px; }
    .lead{ font-size:15.5px; line-height:1.5; margin-top:16px; max-width:34rem; }
    .lead span + span{ margin-top:10px; }

    /* products become a calm vertical list */
    .rail{ order:2; flex-direction:column; align-items:center; flex-wrap:nowrap; gap:26px; padding:46px 0 0; }
    .cluster{ flex-direction:column; align-items:center; gap:26px; }
    .cluster.india{ gap:22px; }
    .product{ text-align:center; font-size:21px; opacity:.95; }
    .product.sub{ font-size:18px; opacity:.8; }
    .product::after{
      position:static; transform:none; display:block; white-space:normal;
      opacity:.66; margin-top:6px; font-size:13px; max-width:26rem;
    }
    .product:hover::after, .product:focus-visible::after{ transform:none; }
    .sep{ width:44px; height:1px; }
    .amp{ display:none; }
  }
</style>
